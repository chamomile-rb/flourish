AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# We use double quotes consistently throughout
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# Style class is complex by nature — handles many properties
Metrics/ClassLength:
  Max: 500

# Modules with lookup tables or complex algorithms
Metrics/ModuleLength:
  Max: 150

# Some methods (render, wrap_line) need to handle many cases
Metrics/MethodLength:
  Max: 50

Metrics/AbcSize:
  Max: 75

Metrics/CyclomaticComplexity:
  Max: 18

Metrics/PerceivedComplexity:
  Max: 18

# We use keyword args extensively
Metrics/ParameterLists:
  Max: 10

# Large lookup tables are fine in color code
Metrics/CollectionLiteralLength:
  Enabled: false

# Short names like n, v, r, g, b, ch, cp are clear in context
Naming/MethodParameterName:
  AllowedNames:
    - n
    - v
    - r
    - g
    - b
    - c
    - i
    - s
    - t
    - x
    - "y"
    - ch
    - cp
    - r1
    - g1
    - b1
    - r2
    - g2
    - b2
    - bs

# Lipgloss-matching API names
Naming/AccessorMethodName:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

# Method names with numbers like truecolor_to_256 are intentional
Naming/VariableNumber:
  Enabled: false

# We prefer annotated format strings but won't enforce everywhere
Style/FormatStringToken:
  Enabled: false

# Standalone library — no top-level docs needed internally
Style/Documentation:
  Enabled: false

# Lipgloss-style API: style.bold(true) not style.bold(v: true)
Style/OptionalBooleanParameter:
  Enabled: false

# We use -> for all lambdas
Style/Lambda:
  EnforcedStyle: literal

# Trailing commas in multiline — keeps diffs clean
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Dev deps in gemspec is fine
Gemspec/DevelopmentDependencies:
  Enabled: false
